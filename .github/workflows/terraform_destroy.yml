name: Terraform Destroy (Manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "You must type 'destroy' to proceed"
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: pillars/dev
        run: terraform init

      - name: Delete EKS Volumes
        run: |
          echo "Finding EBS volumes with Name starting with eks-dev..."

          aws ec2 describe-volumes \
            --region us-east-1 \
            --filters Name=status,Values=available \
            --query "Volumes[*].[VolumeId,Tags[?Key=='Name']|[0].Value]" \
            --output text |
          while read VOL_ID VOL_NAME; do
            if [[ "$VOL_NAME" == eks-dev* ]]; then
              echo "Deleting volume: $VOL_ID ($VOL_NAME)"
              aws ec2 delete-volume \
                --volume-id $VOL_ID \
                --region us-east-1
            fi
          done

      - name: Terraform Destroy
        working-directory: pillars/dev
        run: terraform destroy -auto-approve
