name: Terraform EKS CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: write

jobs:

# #########################################
# VERSIONING JOB
# #########################################

  versioning:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Read & Increment Version
        id: bump
        run: |

          FILE="version.txt"

          if [ ! -f $FILE ]; then
            echo "v1.0.0" > $FILE
          fi

          VERSION=$(cat $FILE)

          echo "Current version: $VERSION"

          MAJOR=$(echo $VERSION | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          PATCH=$((PATCH+1))

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"

          echo "New version: $NEW_VERSION"

          echo $NEW_VERSION > $FILE

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit Updated Version
        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add version.txt

          git commit -m "Auto bump version to ${{ steps.bump.outputs.version }}"

          git push

# #########################################
# TERRAFORM DEPLOY
# #########################################

  deploy:
    needs: versioning

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      # SELECT TERRAFORM PATH
      - name: Set Environment Variables
        id: env
        run: |

          ENVIRONMENT="${{ github.event.inputs.environment }}"

          if [ "$ENVIRONMENT" = "dev" ]; then

            echo "TF_PATH=pillars/dev" >> $GITHUB_OUTPUT

          elif [ "$ENVIRONMENT" = "prod" ]; then

            echo "TF_PATH=pillars/prod" >> $GITHUB_OUTPUT

          fi

      # AWS LOGIN
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      # TERRAFORM
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # INIT
      - name: Terraform Init
        working-directory: ${{ steps.env.outputs.TF_PATH }}
        run: terraform init -upgrade

      # PLAN
      - name: Terraform Plan
        working-directory: ${{ steps.env.outputs.TF_PATH }}
        run: |

          VERSION="${{ needs.versioning.outputs.version }}"

          terraform plan \
            -var="app_version=$VERSION"

      # APPLY
      - name: Terraform Apply
        working-directory: ${{ steps.env.outputs.TF_PATH }}
        run: |

          VERSION="${{ needs.versioning.outputs.version }}"

          terraform apply -auto-approve \
            -var="app_version=$VERSION"
